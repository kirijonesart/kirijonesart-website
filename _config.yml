title: "Kiri Jones ART"
description: "Community art classes and creative exploration"
url: "" # set to your GitHub Pages URL later
baseurl: "" # e.g. /repo-name if publishing from project site

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Navigation (used in layout)
nav:
  - title: "About"
    url: /about/
  - title: "Gallery"
    url: /gallery/
  - title: "Commissions"
    url: /commissions/
  - title: "Classes"
    url: /classes/
  - title: "Student Gallery"
    url: /student-gallery/
  - title: "Contact"
    url: /contact/

collections:
  classes:
    output: true

permalink: pretty

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
      type: "classes"
    values:
      layout: class
