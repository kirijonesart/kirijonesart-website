<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} | {{ site.title }}</title>
  {%- seo -%}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  <header class="site-header" role="banner">
    <div class="hero-bg" aria-hidden="true"></div>
    <div class="wrapper header-inner">
      <div class="branding">
        <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        {%- if site.description %}<p class="tagline">{{ site.description }}</p>{% endif %}
      </div>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="primary-nav">
        <span class="nav-toggle-icon"></span>
      </button>
      <nav class="site-nav" id="primary-nav" aria-label="Primary">
        <ul>
          {%- for item in site.nav -%}
            <li><a href="{{ item.url | relative_url }}" class="{%- if page.url == item.url -%}active{%- endif -%}">{{ item.title }}</a></li>
          {%- endfor -%}
        </ul>
      </nav>
    </div>
  </header>
  <script>
  (function(){
    var btn = document.querySelector('.nav-toggle');
    var nav = document.getElementById('primary-nav');
    btn.addEventListener('click', function(){
      var open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open);
    });
  })();
  </script>
  <main class="site-content wrapper">
    {{ content }}
  </main>
  <footer class="site-footer wrapper">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
    <ul class="social-links" aria-label="Social media links">
      <li>
        <a class="facebook" href="https://www.facebook.com/kiri.jones.art.2024" target="_blank" rel="noopener noreferrer" aria-label="Facebook (opens in new tab)">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false"><path fill="currentColor" d="M22.675 0H1.325A1.32 1.32 0 0 0 0 1.318v21.364C0 23.403.593 24 1.325 24h11.49v-9.294H9.69v-3.622h3.126V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.098 2.795.142v3.24l-1.92.001c-1.505 0-1.797.716-1.797 1.767v2.318h3.587l-.467 3.622h-3.12V24h6.116A1.32 1.32 0 0 0 24 22.682V1.318A1.32 1.32 0 0 0 22.675 0"/></svg>
          <span class="sr-only">Facebook</span>
        </a>
      </li>
      <li>
        <a class="instagram" href="https://www.instagram.com/kirijonesart/" target="_blank" rel="noopener noreferrer" aria-label="Instagram (opens in new tab)">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true" focusable="false"><path fill="currentColor" d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.35 3.608 1.325.975.975 1.262 2.242 1.324 3.608.059 1.266.07 1.646.07 4.85s-.011 3.584-.07 4.85c-.062 1.366-.35 2.633-1.324 3.608-.975.975-2.242 1.262-3.608 1.324-1.266.059-1.646.07-4.85.07s-3.584-.011-4.85-.07c-1.366-.062-2.633-.35-3.608-1.324-.975-.975-1.262-2.242-1.324-3.608C2.175 15.784 2.163 15.404 2.163 12s.012-3.584.07-4.85c.062-1.366.35-2.633 1.324-3.608.975-.975 2.242-1.262 3.608-1.324C8.416 2.175 8.796 2.163 12 2.163m0-2.163C8.741 0 8.332.014 7.052.072 5.775.13 4.638.428 3.678 1.387 2.718 2.347 2.42 3.484 2.362 4.761 2.304 6.041 2.29 6.45 2.29 9.709v4.582c0 3.26.014 3.668.072 4.948.058 1.277.356 2.414 1.316 3.373.96.96 2.097 1.258 3.373 1.316 1.28.058 1.689.072 4.948.072s3.668-.014 4.948-.072c1.277-.058 2.414-.356 3.373-1.316.96-.96 1.258-2.097 1.316-3.373.058-1.28.072-1.689.072-4.948V9.709c0-3.26-.014-3.668-.072-4.948-.058-1.277-.356-2.414-1.316-3.373-.96-.96-2.097-1.258-3.373-1.316C15.668.014 15.259 0 12 0Z"/><path fill="currentColor" d="M12 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324m0 10.162a3.999 3.999 0 1 1 0-7.998 3.999 3.999 0 0 1 0 7.998M18.406 4.594a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881"/></svg>

  </footer>
</body>
</html>
