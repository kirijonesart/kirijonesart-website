---
layout: default
---
<article class="class">
  <header>
    <h1>{{ page.title }}</h1>
    <p class="meta">
      {% if page.level %}<span class="level">Level: {{ page.level }}</span>{% endif %}
      {% if page.age_range %}<span class="age">Age: {{ page.age_range }}</span>{% endif %}
      {% if page.schedule %}<span class="schedule">Schedule: {{ page.schedule }}</span>{% endif %}
      {% if page.fee %}<span class="fee">Fee: {{ page.fee }}</span>{% endif %}
    </p>
  </header>
  <div class="class-description">
    {{ content }}
  </div>
</article>
